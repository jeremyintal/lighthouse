<!-- @dsCard group="Colors" viewport="700x170" subtitle="Bedtime theme — warm, dim, never pure black" name="Dark — bedtime" -->
<!DOCTYPE html><html><head><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-ui)}</style></head>
<body data-theme="dark" style="background:var(--paper);display:flex;gap:8px;padding:16px;box-sizing:border-box;align-items:stretch">
<div style="flex:1.4;background:var(--surface-card);border:1px solid var(--border-hairline);border-radius:16px;padding:14px 16px;color:var(--text-body)">
  <div style="font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-accent)">Bedtime</div>
  <div style="font-family:var(--font-display);font-size:19px;margin-top:6px">You kept it together longer today.</div>
  <div style="font-size:13px;color:var(--text-soft);margin-top:4px">That counts.</div>
</div>
<div style="flex:1;display:flex;flex-direction:column;gap:8px">
  <div style="flex:1;border-radius:10px;background:var(--accent);color:var(--on-accent);display:flex;align-items:center;padding:0 12px;font-size:12px;font-weight:600">accent #6fae99</div>
  <div style="flex:1;border-radius:10px;background:var(--accent-soft);color:var(--accent-strong);display:flex;align-items:center;padding:0 12px;font-size:12px;font-weight:600">accent-soft</div>
  <div style="flex:1;border-radius:10px;background:var(--repair);color:#1c110a;display:flex;align-items:center;padding:0 12px;font-size:12px;font-weight:600">repair #d1855f</div>
</div>
</body></html>
