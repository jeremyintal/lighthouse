<!-- @dsCard group="Colors" viewport="700x150" subtitle="Clay for repair; amber + red are rare by design" name="Semantic — repair, warn, crisis" -->
<!DOCTYPE html><html><head><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-ui);background:var(--paper);display:flex;gap:8px;padding:16px;box-sizing:border-box}
.sw{flex:1;border-radius:12px;padding:10px;display:flex;flex-direction:column;justify-content:flex-end;height:118px;box-sizing:border-box}
.sw b{font-size:12px;font-weight:600}.sw span{font-size:11px;opacity:.8}</style></head><body>
<div class="sw" style="background:var(--clay-700);color:#fff"><b>clay-700</b><span>repair strong</span></div>
<div class="sw" style="background:var(--clay-600);color:#fff"><b>clay-600 · repair</b><span>#b4633f</span></div>
<div class="sw" style="background:var(--clay-100);color:var(--clay-700)"><b>clay-100</b><span>repair soft</span></div>
<div class="sw" style="background:var(--amber-50);color:var(--amber-700);border:1px solid var(--amber-500)"><b>amber</b><span>warn · #8a6210</span></div>
<div class="sw" style="background:var(--red-50);color:var(--red-700)"><b>red</b><span>crisis only · #a2402e</span></div>
</body></html>
