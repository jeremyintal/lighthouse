<!-- @dsCard group="Colors" viewport="700x150" subtitle="Steady green — the one primary" name="Primary — Steady green" -->
<!DOCTYPE html><html><head><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-ui);background:var(--paper);display:flex;gap:8px;padding:16px;box-sizing:border-box}
.sw{flex:1;border-radius:12px;padding:10px;display:flex;flex-direction:column;justify-content:flex-end;height:118px;box-sizing:border-box}
.sw b{font-size:12px;font-weight:600}.sw span{font-size:11px;opacity:.75}</style></head><body>
<div class="sw" style="background:var(--green-900);color:#fff"><b>green-900</b><span>#1e3b33</span></div>
<div class="sw" style="background:var(--green-800);color:#fff"><b>green-800</b><span>#274d42</span></div>
<div class="sw" style="background:var(--green-700);color:#fff;outline:2px solid var(--ink);outline-offset:2px"><b>green-700 · accent</b><span>#2f6f5e</span></div>
<div class="sw" style="background:var(--green-600);color:#fff"><b>green-600</b><span>#3d8571</span></div>
<div class="sw" style="background:var(--green-300);color:var(--ink)"><b>green-300</b><span>#9cc7b6</span></div>
<div class="sw" style="background:var(--green-100);color:var(--ink)"><b>green-100</b><span>#e7f2ee</span></div>
<div class="sw" style="background:var(--green-50);color:var(--ink);border:1px solid var(--line)"><b>green-50</b><span>#f2f8f5</span></div>
</body></html>
