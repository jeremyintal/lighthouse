<!-- @dsCard group="Spacing" viewport="700x170" subtitle="Soft radii + whisper shadows" name="Shape & elevation" -->
<!DOCTYPE html><html><head><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-ui);background:var(--paper);padding:20px 24px;display:flex;gap:14px;align-items:center;color:var(--text-body)}
.c{background:var(--surface-card);display:flex;align-items:flex-end;padding:10px;font-size:11px;color:var(--text-soft);height:100px;flex:1;box-sizing:border-box}</style></head><body>
<div class="c" style="border-radius:var(--radius-sm);border:1px solid var(--line)">sm 10 · chips</div>
<div class="c" style="border-radius:var(--radius-md);border:1px solid var(--line)">md 14 · buttons</div>
<div class="c" style="border-radius:var(--radius-lg);box-shadow:var(--shadow-card)">lg 20 · shadow-card</div>
<div class="c" style="border-radius:var(--radius-xl);box-shadow:var(--shadow-raised)">xl 28 · shadow-raised</div>
<div style="width:100px;height:100px;flex:none;border-radius:var(--radius-full);background:var(--accent);color:#fff;box-shadow:var(--shadow-sos);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600">shadow-sos</div>
</body></html>
