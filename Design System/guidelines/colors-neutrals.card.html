<!-- @dsCard group="Colors" viewport="700x150" subtitle="Warm paper neutrals and ink" name="Neutrals" -->
<!DOCTYPE html><html><head><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-ui);background:#fff;display:flex;gap:8px;padding:16px;box-sizing:border-box}
.sw{flex:1;border-radius:12px;padding:10px;display:flex;flex-direction:column;justify-content:flex-end;height:118px;box-sizing:border-box;border:1px solid var(--line)}
.sw b{font-size:12px;font-weight:600}.sw span{font-size:11px;opacity:.75}</style></head><body>
<div class="sw" style="background:var(--paper)"><b>paper</b><span>#faf9f5 · app bg</span></div>
<div class="sw" style="background:var(--surface)"><b>surface</b><span>#ffffff · cards</span></div>
<div class="sw" style="background:var(--surface-sunken)"><b>surface-sunken</b><span>#f3f1ea · wells</span></div>
<div class="sw" style="background:var(--line)"><b>line</b><span>#e4e1d7 · hairline</span></div>
<div class="sw" style="background:var(--ink-faint);color:#fff;border:none"><b>ink-faint</b><span>#8b9791</span></div>
<div class="sw" style="background:var(--ink-soft);color:#fff;border:none"><b>ink-soft</b><span>#5b6a64</span></div>
<div class="sw" style="background:var(--ink);color:#fff;border:none"><b>ink</b><span>#22302b · text</span></div>
</body></html>
