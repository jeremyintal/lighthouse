<!DOCTYPE html><html><head><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-ui);background:#fff;padding:18px 24px;color:var(--text-body);display:flex;flex-direction:column;gap:8px}
.row{display:flex;align-items:baseline;gap:16px}.m{font-size:11px;color:var(--text-faint);width:120px;flex:none}</style></head><body>
<div class="row"><span class="m">heading 20/26 · 600</span><span style="font-size:var(--type-heading-size);line-height:var(--type-heading-line);font-weight:600">When they hit or throw</span></div>
<div class="row"><span class="m">body 17/26 · 400</span><span style="font-size:var(--type-body-size);line-height:var(--type-body-line)">You're not failing. This is a hard age.</span></div>
<div class="row"><span class="m">label 15/20 · 600</span><span style="font-size:var(--type-label-size);font-weight:600">Try it now</span></div>
<div class="row"><span class="m">caption 13/18 · 500</span><span style="font-size:var(--type-caption-size);font-weight:500;color:var(--text-soft)">We never collect anything about your child.</span></div>
<div class="row"><span class="m">overline 12 · 700</span><span style="font-size:var(--type-overline-size);font-weight:700;letter-spacing:var(--tracking-overline);text-transform:uppercase;color:var(--text-accent)">After the storm</span></div>
</body></html>
