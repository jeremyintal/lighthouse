<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>html,body{margin:0;background:var(--paper)}</style></head>
<body><div id="root"></div>
<script type="application/json" id="src">"const { useState, useEffect, useId } = React;\n\n/* components/steady/Icon.jsx */\n\n/**\n * Steady's only iconography wrapper. Renders a Lucide glyph via CSS mask over\n * the lucide-static CDN, colored with currentColor. Icons support text, never\n * replace it. No emoji, ever.\n */\nfunction Icon({ name, size = 20, color = \"currentColor\", strokeGuard = true, style, ...rest }) {\n  const url = `https://cdn.jsdelivr.net/npm/lucide-static@0.454.0/icons/${name}.svg`;\n  return (\n    <span\n      role=\"img\"\n      aria-hidden=\"true\"\n      style={{\n        display: \"inline-block\",\n        width: size,\n        height: size,\n        flex: \"none\",\n        backgroundColor: color,\n        WebkitMaskImage: `url(${url})`,\n        maskImage: `url(${url})`,\n        WebkitMaskRepeat: \"no-repeat\",\n        maskRepeat: \"no-repeat\",\n        WebkitMaskPosition: \"center\",\n        maskPosition: \"center\",\n        WebkitMaskSize: \"contain\",\n        maskSize: \"contain\",\n        ...style,\n      }}\n      {...rest}\n    />\n  );\n}\n\n\n/* components/actions/Button.jsx */\n\n/**\n * Steady button. Honest verbs, sentence case, ≥44px tall (one-handed law).\n * Variants: primary (Steady green), repair (clay — aftermath moments),\n * secondary (tinted), ghost (quiet, for real declines), crisis (rare).\n */\nfunction Button({\n  children,\n  variant = \"primary\",\n  size = \"lg\",\n  fullWidth = true,\n  leadingIcon,\n  trailingIcon,\n  disabled = false,\n  style,\n  ...rest\n}) {\n  const [pressed, setPressed] = React.useState(false);\n\n  const sizes = {\n    lg: { height: \"var(--tap-comfy)\", padding: \"0 24px\", font: \"var(--type-label-size)\" },\n    md: { height: \"var(--tap-min)\", padding: \"0 18px\", font: \"var(--type-label-size)\" },\n    sm: { height: 36, padding: \"0 14px\", font: \"var(--type-caption-size)\" },\n  }[size];\n\n  const variants = {\n    primary: { background: \"var(--accent)\", color: \"var(--on-accent)\", border: \"1px solid transparent\" },\n    repair: { background: \"var(--repair)\", color: \"#ffffff\", border: \"1px solid transparent\" },\n    secondary: { background: \"var(--accent-soft)\", color: \"var(--accent-strong)\", border: \"1px solid transparent\" },\n    ghost: { background: \"transparent\", color: \"var(--text-soft)\", border: \"1px solid var(--border-hairline)\" },\n    crisis: { background: \"var(--red-50)\", color: \"var(--red-700)\", border: \"1px solid var(--red-700)\" },\n  }[variant];\n\n  return (\n    <button\n      type=\"button\"\n      disabled={disabled}\n      onPointerDown={() => setPressed(true)}\n      onPointerUp={() => setPressed(false)}\n      onPointerLeave={() => setPressed(false)}\n      style={{\n        display: \"inline-flex\",\n        alignItems: \"center\",\n        justifyContent: \"center\",\n        gap: 10,\n        width: fullWidth ? \"100%\" : \"auto\",\n        height: sizes.height,\n        padding: sizes.padding,\n        fontFamily: \"var(--font-ui)\",\n        fontSize: sizes.font,\n        fontWeight: 600,\n        lineHeight: 1,\n        borderRadius: \"var(--radius-md)\",\n        cursor: disabled ? \"not-allowed\" : \"pointer\",\n        opacity: disabled ? 0.45 : 1,\n        transform: pressed && !disabled ? \"scale(0.98)\" : \"scale(1)\",\n        transition: \"transform var(--dur-fast) var(--ease-calm), background var(--dur-fast) var(--ease-calm)\",\n        WebkitTapHighlightColor: \"transparent\",\n        ...variants,\n        ...style,\n      }}\n      {...rest}\n    >\n      {leadingIcon}\n      {children}\n      {trailingIcon}\n    </button>\n  );\n}\n\n\n/* components/actions/IconButton.jsx */\n\n/**\n * A round, icon-only control for quiet chrome actions (close a sheet, back).\n * Always carries an aria-label — icons never stand alone semantically.\n */\nfunction IconButton({ icon, label, variant = \"quiet\", size = 44, style, ...rest }) {\n  const [pressed, setPressed] = React.useState(false);\n  const variants = {\n    quiet: { background: \"var(--surface-well)\", color: \"var(--text-soft)\" },\n    onDark: { background: \"rgba(255,255,255,0.16)\", color: \"var(--text-on-dark)\" },\n    accent: { background: \"var(--accent-soft)\", color: \"var(--accent-strong)\" },\n  }[variant];\n  return (\n    <button\n      type=\"button\"\n      aria-label={label}\n      onPointerDown={() => setPressed(true)}\n      onPointerUp={() => setPressed(false)}\n      onPointerLeave={() => setPressed(false)}\n      style={{\n        display: \"inline-flex\",\n        alignItems: \"center\",\n        justifyContent: \"center\",\n        width: size,\n        height: size,\n        border: \"none\",\n        borderRadius: \"var(--radius-full)\",\n        cursor: \"pointer\",\n        transform: pressed ? \"scale(0.98)\" : \"scale(1)\",\n        transition: \"transform var(--dur-fast) var(--ease-calm)\",\n        WebkitTapHighlightColor: \"transparent\",\n        ...variants,\n        ...style,\n      }}\n      {...rest}\n    >\n      {typeof icon === \"string\" ? <Icon name={icon} size={Math.round(size * 0.45)} /> : icon}\n    </button>\n  );\n}\n\n\n/* components/actions/Chip.jsx */\n\n/**\n * A selectable pill — situation filters (\"Bedtime\", \"Mealtime\") and check-in\n * feelings. Toggles between quiet and selected; ≥44px tall for thumb use.\n */\nfunction Chip({ children, selected = false, leadingIcon, style, ...rest }) {\n  const [pressed, setPressed] = React.useState(false);\n  return (\n    <button\n      type=\"button\"\n      aria-pressed={selected}\n      onPointerDown={() => setPressed(true)}\n      onPointerUp={() => setPressed(false)}\n      onPointerLeave={() => setPressed(false)}\n      style={{\n        display: \"inline-flex\",\n        alignItems: \"center\",\n        gap: 8,\n        minHeight: \"var(--tap-min)\",\n        padding: \"0 18px\",\n        fontFamily: \"var(--font-ui)\",\n        fontSize: \"var(--type-label-size)\",\n        fontWeight: 600,\n        color: selected ? \"var(--on-accent)\" : \"var(--text-soft)\",\n        background: selected ? \"var(--accent)\" : \"var(--surface-card)\",\n        border: `1px solid ${selected ? \"transparent\" : \"var(--border-hairline)\"}`,\n        borderRadius: \"var(--radius-full)\",\n        cursor: \"pointer\",\n        transform: pressed ? \"scale(0.98)\" : \"scale(1)\",\n        transition: \"transform var(--dur-fast) var(--ease-calm), background var(--dur-fast) var(--ease-calm), color var(--dur-fast) var(--ease-calm)\",\n        WebkitTapHighlightColor: \"transparent\",\n        ...style,\n      }}\n      {...rest}\n    >\n      {leadingIcon}\n      {children}\n    </button>\n  );\n}\n\n\n/* components/forms/Input.jsx */\n\n/**\n * A quiet, honest text field. Label sits above; helper/trust line below.\n * Big (56px) target, soft focus ring, warm well when empty.\n */\nfunction Input({\n  label,\n  helper,\n  value,\n  placeholder,\n  type = \"text\",\n  invalid = false,\n  style,\n  ...rest\n}) {\n  const [focus, setFocus] = React.useState(false);\n  const id = React.useId();\n  return (\n    <div style={{ display: \"flex\", flexDirection: \"column\", gap: 6, width: \"100%\", ...style }}>\n      {label && (\n        <label htmlFor={id} style={{ fontFamily: \"var(--font-ui)\", fontSize: \"var(--type-label-size)\", fontWeight: 600, color: \"var(--text-body)\" }}>\n          {label}\n        </label>\n      )}\n      <input\n        id={id}\n        type={type}\n        value={value}\n        placeholder={placeholder}\n        onFocus={() => setFocus(true)}\n        onBlur={() => setFocus(false)}\n        style={{\n          height: \"var(--tap-comfy)\",\n          padding: \"0 16px\",\n          fontFamily: \"var(--font-ui)\",\n          fontSize: \"var(--type-body-size)\",\n          color: \"var(--text-body)\",\n          background: \"var(--surface-card)\",\n          border: `1px solid ${invalid ? \"var(--red-700)\" : focus ? \"var(--accent)\" : \"var(--border-input)\"}`,\n          borderRadius: \"var(--radius-md)\",\n          outline: \"none\",\n          boxShadow: focus ? \"var(--focus-ring)\" : \"none\",\n          transition: \"border-color var(--dur-fast) var(--ease-calm), box-shadow var(--dur-fast) var(--ease-calm)\",\n        }}\n        {...rest}\n      />\n      {helper && (\n        <span style={{ fontFamily: \"var(--font-ui)\", fontSize: \"var(--type-caption-size)\", color: invalid ? \"var(--red-700)\" : \"var(--text-soft)\" }}>\n          {helper}\n        </span>\n      )}\n    </div>\n  );\n}\n\n\n/* components/forms/Switch.jsx */\n\n/**\n * A calm toggle for the few settings Steady has (haptics, bedtime theme,\n * anonymous mode). Slow track transition; ≥44px row hit area recommended.\n */\nfunction Switch({ checked = false, onChange, label, description, disabled = false, style }) {\n  return (\n    <label style={{ display: \"flex\", alignItems: \"center\", gap: 16, cursor: disabled ? \"default\" : \"pointer\", opacity: disabled ? 0.5 : 1, ...style }}>\n      {(label || description) && (\n        <span style={{ flex: 1, display: \"flex\", flexDirection: \"column\", gap: 2 }}>\n          {label && <span style={{ fontFamily: \"var(--font-ui)\", fontSize: \"var(--type-body-size)\", fontWeight: 500, color: \"var(--text-body)\" }}>{label}</span>}\n          {description && <span style={{ fontFamily: \"var(--font-ui)\", fontSize: \"var(--type-caption-size)\", color: \"var(--text-soft)\" }}>{description}</span>}\n        </span>\n      )}\n      <span\n        role=\"switch\"\n        aria-checked={checked}\n        onClick={() => !disabled && onChange && onChange(!checked)}\n        style={{\n          position: \"relative\",\n          width: 52,\n          height: 32,\n          flex: \"none\",\n          borderRadius: \"var(--radius-full)\",\n          background: checked ? \"var(--accent)\" : \"var(--surface-well)\",\n          border: `1px solid ${checked ? \"transparent\" : \"var(--border-input)\"}`,\n          transition: \"background var(--dur-gentle) var(--ease-calm)\",\n        }}\n      >\n        <span\n          style={{\n            position: \"absolute\",\n            top: 3,\n            left: checked ? 23 : 3,\n            width: 24,\n            height: 24,\n            borderRadius: \"var(--radius-full)\",\n            background: \"#fff\",\n            boxShadow: \"0 1px 3px rgba(30,45,40,0.25)\",\n            transition: \"left var(--dur-gentle) var(--ease-settle)\",\n          }}\n        />\n      </span>\n    </label>\n  );\n}\n\n\n/* components/surfaces/Card.jsx */\n\n/**\n * The base surface. Soft 20px radius, whisper shadow OR hairline (not both heavy).\n * `tone` shifts the fill for repair / bedtime / accent moments.\n */\nfunction Card({ children, tone = \"surface\", elevated = true, padding = 20, onClick, style, ...rest }) {\n  const [pressed, setPressed] = React.useState(false);\n  const tones = {\n    surface: { background: \"var(--surface-card)\", color: \"var(--text-body)\" },\n    well: { background: \"var(--surface-well)\", color: \"var(--text-body)\" },\n    accent: { background: \"var(--accent-faint)\", color: \"var(--text-body)\" },\n    repair: { background: \"var(--repair-soft)\", color: \"var(--repair-strong)\" },\n    deep: { background: \"var(--surface-accent-deep)\", color: \"var(--text-on-dark)\" },\n  }[tone];\n  const interactive = !!onClick;\n  return (\n    <div\n      onClick={onClick}\n      onPointerDown={() => interactive && setPressed(true)}\n      onPointerUp={() => setPressed(false)}\n      onPointerLeave={() => setPressed(false)}\n      style={{\n        borderRadius: \"var(--radius-lg)\",\n        padding,\n        boxShadow: elevated && tone === \"surface\" ? \"var(--shadow-card)\" : \"none\",\n        border: elevated && tone === \"surface\" ? \"none\" : tone === \"deep\" ? \"none\" : \"1px solid var(--border-hairline)\",\n        cursor: interactive ? \"pointer\" : \"default\",\n        transform: pressed ? \"scale(0.99)\" : \"scale(1)\",\n        transition: \"transform var(--dur-fast) var(--ease-calm)\",\n        ...tones,\n        ...style,\n      }}\n      {...rest}\n    >\n      {children}\n    </div>\n  );\n}\n\n\n/* components/surfaces/Badge.jsx */\n\n/**\n * A tiny status/category label. Quiet by default; sentence case, no shouting.\n * Used for \"Free\", \"Bedtime\", \"New lesson\" — never for counts or urgency.\n */\nfunction Badge({ children, tone = \"neutral\", style, ...rest }) {\n  const tones = {\n    neutral: { background: \"var(--surface-well)\", color: \"var(--text-soft)\" },\n    accent: { background: \"var(--accent-soft)\", color: \"var(--accent-strong)\" },\n    repair: { background: \"var(--repair-soft)\", color: \"var(--repair-strong)\" },\n    free: { background: \"var(--green-100)\", color: \"var(--accent-strong)\" },\n    warn: { background: \"var(--amber-50)\", color: \"var(--amber-700)\" },\n  }[tone];\n  return (\n    <span\n      style={{\n        display: \"inline-flex\",\n        alignItems: \"center\",\n        gap: 6,\n        padding: \"5px 10px\",\n        fontFamily: \"var(--font-ui)\",\n        fontSize: \"var(--type-caption-size)\",\n        fontWeight: 600,\n        borderRadius: \"var(--radius-sm)\",\n        ...tones,\n        ...style,\n      }}\n      {...rest}\n    >\n      {children}\n    </span>\n  );\n}\n\n\n/* components/surfaces/Sheet.jsx */\n\n/**\n * Bottom sheet — the app's main way to surface a moment (script, check-in).\n * Plain scrim (no blur), 28px top radius, gentle slide. Grabber + optional close.\n */\nfunction Sheet({ children, open = true, title, onClose, style }) {\n  return (\n    <div\n      style={{\n        position: \"absolute\",\n        inset: 0,\n        display: \"flex\",\n        flexDirection: \"column\",\n        justifyContent: \"flex-end\",\n        background: open ? \"rgba(34,48,43,0.4)\" : \"transparent\",\n        pointerEvents: open ? \"auto\" : \"none\",\n        transition: \"background var(--dur-gentle) var(--ease-calm)\",\n      }}\n      onClick={onClose}\n    >\n      <div\n        onClick={(e) => e.stopPropagation()}\n        style={{\n          background: \"var(--surface-card)\",\n          borderTopLeftRadius: \"var(--radius-xl)\",\n          borderTopRightRadius: \"var(--radius-xl)\",\n          padding: \"12px var(--screen-pad) calc(var(--screen-pad) + env(safe-area-inset-bottom, 8px))\",\n          boxShadow: \"var(--shadow-raised)\",\n          transform: open ? \"translateY(0)\" : \"translateY(100%)\",\n          transition: \"transform var(--dur-gentle) var(--ease-settle)\",\n          ...style,\n        }}\n      >\n        <div style={{ width: 40, height: 5, borderRadius: 999, background: \"var(--line-strong)\", margin: \"0 auto 14px\" }} />\n        {title && (\n          <h2 style={{ margin: \"0 0 12px\", fontFamily: \"var(--font-display)\", fontSize: \"var(--type-title-size)\", lineHeight: \"var(--type-title-line)\", fontWeight: \"var(--type-title-weight)\", color: \"var(--text-body)\" }}>\n            {title}\n          </h2>\n        )}\n        {children}\n      </div>\n    </div>\n  );\n}\n\n\n/* components/steady/SOSButton.jsx */\n\n/**\n * The hero. One big, soft, gently breathing button a parent taps mid-meltdown.\n * Fully round, always in the bottom half of the screen, huge hit target.\n * Breathes on an 8s cycle (respects prefers-reduced-motion via the CSS keyframe).\n */\nfunction SOSButton({ label = \"It's happening\", sublabel = \"Tap for a breather\", size = 220, onClick, style }) {\n  const [pressed, setPressed] = React.useState(false);\n  return (\n    <button\n      type=\"button\"\n      onClick={onClick}\n      onPointerDown={() => setPressed(true)}\n      onPointerUp={() => setPressed(false)}\n      onPointerLeave={() => setPressed(false)}\n      style={{\n        position: \"relative\",\n        width: size,\n        height: size,\n        border: \"none\",\n        borderRadius: \"var(--radius-full)\",\n        background: \"transparent\",\n        cursor: \"pointer\",\n        WebkitTapHighlightColor: \"transparent\",\n        transform: pressed ? \"scale(0.98)\" : \"scale(1)\",\n        transition: \"transform var(--dur-fast) var(--ease-calm)\",\n        ...style,\n      }}\n    >\n      {/* halo — soft, slow, out of phase */}\n      <span\n        aria-hidden=\"true\"\n        style={{\n          position: \"absolute\",\n          inset: -18,\n          borderRadius: \"var(--radius-full)\",\n          background: \"var(--accent)\",\n          opacity: 0.16,\n          animation: \"steady-breathe-soft calc(var(--dur-breath) * 2) var(--ease-calm) infinite\",\n        }}\n      />\n      {/* core */}\n      <span\n        style={{\n          position: \"absolute\",\n          inset: 0,\n          display: \"flex\",\n          flexDirection: \"column\",\n          alignItems: \"center\",\n          justifyContent: \"center\",\n          gap: 6,\n          borderRadius: \"var(--radius-full)\",\n          background: \"radial-gradient(120% 120% at 50% 30%, var(--accent) 0%, var(--accent-strong) 100%)\",\n          color: \"var(--on-accent)\",\n          boxShadow: \"var(--shadow-sos)\",\n          animation: \"steady-breathe calc(var(--dur-breath) * 2) var(--ease-calm) infinite\",\n        }}\n      >\n        <span style={{ fontFamily: \"var(--font-display)\", fontSize: 26, lineHeight: \"30px\", fontWeight: 560 }}>{label}</span>\n        <span style={{ fontFamily: \"var(--font-ui)\", fontSize: \"var(--type-caption-size)\", fontWeight: 500, opacity: 0.82 }}>{sublabel}</span>\n      </span>\n    </button>\n  );\n}\n\n\n/* components/steady/BreatherOrb.jsx */\n\n/**\n * The 60-second breather. A slow expanding/contracting orb on the deep-green\n * immersive field, with a \"Breathe in / Breathe out\" cue. Pace is fixed at the\n * 8s calm cycle. Meant to be rendered full-bleed on a `deep` surface.\n */\nfunction BreatherOrb({ size = 260, cue = true }) {\n  const [phase, setPhase] = React.useState(\"Breathe in\");\n  React.useEffect(() => {\n    if (!cue) return;\n    const id = setInterval(() => setPhase((p) => (p === \"Breathe in\" ? \"Breathe out\" : \"Breathe in\")), 4000);\n    return () => clearInterval(id);\n  }, [cue]);\n  return (\n    <div style={{ display: \"flex\", flexDirection: \"column\", alignItems: \"center\", gap: 28 }}>\n      <div style={{ position: \"relative\", width: size, height: size, display: \"flex\", alignItems: \"center\", justifyContent: \"center\" }}>\n        <span aria-hidden=\"true\" style={{ position: \"absolute\", inset: 0, borderRadius: \"var(--radius-full)\", background: \"rgba(255,255,255,0.10)\", animation: \"steady-breathe-soft calc(var(--dur-breath) * 2) var(--ease-calm) infinite\" }} />\n        <span aria-hidden=\"true\" style={{ position: \"absolute\", inset: size * 0.16, borderRadius: \"var(--radius-full)\", background: \"rgba(255,255,255,0.16)\", animation: \"steady-breathe calc(var(--dur-breath) * 2) var(--ease-calm) infinite\" }} />\n        <span style={{ position: \"absolute\", inset: size * 0.30, borderRadius: \"var(--radius-full)\", background: \"rgba(255,255,255,0.92)\", animation: \"steady-breathe calc(var(--dur-breath) * 2) var(--ease-calm) infinite\" }} />\n      </div>\n      {cue && (\n        <span style={{ fontFamily: \"var(--font-display)\", fontSize: \"var(--type-title-size)\", fontWeight: 500, color: \"var(--text-on-dark)\", transition: \"opacity var(--dur-gentle) var(--ease-calm)\" }}>\n          {phase}\n        </span>\n      )}\n    </div>\n  );\n}\n\n\n/* components/steady/ScriptCard.jsx */\n\n/**\n * The trust engine. One script: an overline situation, the serif line(s) a\n * parent says out loud, one DO and one DON'T. Repair scripts stay free (badge).\n */\nfunction ScriptCard({ situation = \"When they hit or throw\", say = [], doLine, dontLine, free = false, style }) {\n  const lines = Array.isArray(say) ? say : [say];\n  return (\n    <div\n      style={{\n        background: \"var(--surface-card)\",\n        borderRadius: \"var(--radius-xl)\",\n        boxShadow: \"var(--shadow-card)\",\n        padding: 24,\n        display: \"flex\",\n        flexDirection: \"column\",\n        gap: 18,\n        ...style,\n      }}\n    >\n      <div style={{ display: \"flex\", alignItems: \"center\", justifyContent: \"space-between\", gap: 12 }}>\n        <span style={{ fontFamily: \"var(--font-ui)\", fontSize: \"var(--type-overline-size)\", fontWeight: 700, letterSpacing: \"var(--tracking-overline)\", textTransform: \"uppercase\", color: \"var(--text-accent)\" }}>\n          {situation}\n        </span>\n        {free && (\n          <span style={{ padding: \"4px 9px\", fontFamily: \"var(--font-ui)\", fontSize: \"var(--type-caption-size)\", fontWeight: 600, borderRadius: \"var(--radius-sm)\", background: \"var(--green-100)\", color: \"var(--accent-strong)\" }}>\n            Free\n          </span>\n        )}\n      </div>\n\n      <div style={{ display: \"flex\", flexDirection: \"column\", gap: 8 }}>\n        {lines.map((l, i) => (\n          <p key={i} style={{ margin: 0, fontFamily: \"var(--font-display)\", fontSize: \"var(--type-script-size)\", lineHeight: \"var(--type-script-line)\", fontWeight: \"var(--type-script-weight)\", color: \"var(--text-body)\" }}>\n            {l.startsWith(\"“\") ? l : l}\n          </p>\n        ))}\n      </div>\n\n      <div style={{ height: 1, background: \"var(--border-hairline)\" }} />\n\n      <div style={{ display: \"flex\", flexDirection: \"column\", gap: 12 }}>\n        <Line kind=\"do\" text={doLine} />\n        <Line kind=\"dont\" text={dontLine} />\n      </div>\n    </div>\n  );\n}\n\nfunction Line({ kind, text }) {\n  if (!text) return null;\n  const isDo = kind === \"do\";\n  return (\n    <div style={{ display: \"flex\", gap: 10, alignItems: \"flex-start\" }}>\n      <span\n        aria-hidden=\"true\"\n        style={{\n          flex: \"none\",\n          marginTop: 2,\n          width: 22,\n          height: 22,\n          borderRadius: \"var(--radius-full)\",\n          display: \"flex\",\n          alignItems: \"center\",\n          justifyContent: \"center\",\n          fontSize: 13,\n          fontWeight: 700,\n          background: isDo ? \"var(--accent-soft)\" : \"var(--repair-soft)\",\n          color: isDo ? \"var(--accent-strong)\" : \"var(--repair-strong)\",\n        }}\n      >\n        {isDo ? \"✓\" : \"—\"}\n      </span>\n      <span style={{ fontFamily: \"var(--font-ui)\", fontSize: \"var(--type-body-size)\", lineHeight: \"var(--type-body-line)\", color: \"var(--text-body)\" }}>\n        <b style={{ fontWeight: 700 }}>{isDo ? \"Do. \" : \"Don't. \"}</b>\n        {text}\n      </span>\n    </div>\n  );\n}\n\n\n/* components/steady/CheckInRow.jsx */\n\n/**\n * The optional one-tap check-in after a moment: \"How did that land?\" — a row of\n * honest feeling chips, no scoring, no judgment. Never required to proceed.\n */\nfunction CheckInRow({\n  prompt = \"How did that land?\",\n  options = [\"Steadier\", \"Still shaky\", \"Rough one\"],\n  value,\n  onSelect,\n  style,\n}) {\n  return (\n    <div style={{ display: \"flex\", flexDirection: \"column\", gap: 12, ...style }}>\n      <span style={{ fontFamily: \"var(--font-ui)\", fontSize: \"var(--type-body-size)\", fontWeight: 500, color: \"var(--text-body)\" }}>{prompt}</span>\n      <div style={{ display: \"flex\", flexWrap: \"wrap\", gap: 10 }}>\n        {options.map((opt) => {\n          const selected = value === opt;\n          return (\n            <button\n              key={opt}\n              type=\"button\"\n              aria-pressed={selected}\n              onClick={() => onSelect && onSelect(opt)}\n              style={{\n                minHeight: \"var(--tap-min)\",\n                padding: \"0 18px\",\n                fontFamily: \"var(--font-ui)\",\n                fontSize: \"var(--type-label-size)\",\n                fontWeight: 600,\n                color: selected ? \"var(--on-accent)\" : \"var(--text-soft)\",\n                background: selected ? \"var(--accent)\" : \"var(--surface-well)\",\n                border: `1px solid ${selected ? \"transparent\" : \"var(--border-hairline)\"}`,\n                borderRadius: \"var(--radius-full)\",\n                cursor: \"pointer\",\n                transition: \"background var(--dur-fast) var(--ease-calm), color var(--dur-fast) var(--ease-calm)\",\n                WebkitTapHighlightColor: \"transparent\",\n              }}\n            >\n              {opt}\n            </button>\n          );\n        })}\n      </div>\n    </div>\n  );\n}\n\n\n/* components/steady/MomentDots.jsx */\n\n/**\n * A gentle, non-judgmental picture of the month — one soft dot per day. Filled\n * dots are days a breather was used; hollow are hard days logged. NO streaks,\n * no counts of failure, no red. Reassurance, not a scoreboard.\n */\nfunction MomentDots({ days = [], caption, columns = 7, style }) {\n  return (\n    <div style={{ display: \"flex\", flexDirection: \"column\", gap: 12, ...style }}>\n      <div style={{ display: \"grid\", gridTemplateColumns: `repeat(${columns}, 1fr)`, gap: 8, justifyItems: \"center\" }}>\n        {days.map((d, i) => {\n          const used = d === \"used\";\n          const hard = d === \"hard\";\n          return (\n            <span\n              key={i}\n              title={used ? \"Used a breather\" : hard ? \"A hard day\" : \"Quiet day\"}\n              style={{\n                width: 18,\n                height: 18,\n                borderRadius: \"var(--radius-full)\",\n                background: used ? \"var(--accent)\" : hard ? \"var(--repair-soft)\" : \"var(--surface-well)\",\n                border: used ? \"none\" : `1.5px solid ${hard ? \"var(--repair)\" : \"var(--border-hairline)\"}`,\n              }}\n            />\n          );\n        })}\n      </div>\n      {caption && (\n        <span style={{ fontFamily: \"var(--font-ui)\", fontSize: \"var(--type-caption-size)\", color: \"var(--text-soft)\", lineHeight: \"var(--type-caption-line)\" }}>\n          {caption}\n        </span>\n      )}\n    </div>\n  );\n}\n\n\n/* ui_kits/app/screens.jsx */\n// Steady UI kit — shared screen chrome + demo data. Business logic only; all\n// styling stays inline in the components. Imported by the UI kit DC via x-import.\n\nconst PHONE_W = 360;\nconst PHONE_H = 760;\n\nfunction Phone({ title, theme = \"light\", pad = true, footer, children }) {\n  return (\n    <div style={{ display: \"flex\", flexDirection: \"column\", alignItems: \"center\", gap: 12 }}>\n      <span style={{ fontFamily: \"var(--font-ui)\", fontSize: 12, fontWeight: 700, letterSpacing: \"0.08em\", textTransform: \"uppercase\", color: \"var(--ink-soft)\" }}>{title}</span>\n      <div\n        data-theme={theme === \"dark\" ? \"dark\" : undefined}\n        data-screen-label={title}\n        style={{\n          position: \"relative\",\n          width: PHONE_W,\n          height: PHONE_H,\n          background: \"var(--surface-app)\",\n          borderRadius: 40,\n          border: \"10px solid #12100d\",\n          boxShadow: \"var(--shadow-raised)\",\n          overflow: \"hidden\",\n          display: \"flex\",\n          flexDirection: \"column\",\n        }}\n      >\n        <div style={{ height: 44, flex: \"none\", display: \"flex\", alignItems: \"center\", justifyContent: \"space-between\", padding: \"0 22px\", fontFamily: \"var(--font-ui)\", fontSize: 13, fontWeight: 600, color: \"var(--text-body)\" }}>\n          <span>9:41</span>\n          <span style={{ width: 90, height: 22, background: \"#12100d\", borderRadius: 999, position: \"absolute\", left: \"50%\", transform: \"translateX(-50%)\", top: 10 }} />\n          <span style={{ display: \"flex\", gap: 5, alignItems: \"center\" }}><Icon name=\"signal\" size={15} /><Icon name=\"battery-medium\" size={17} /></span>\n        </div>\n        <div style={{ flex: 1, overflow: \"hidden\", display: \"flex\", flexDirection: \"column\", padding: pad ? \"4px 24px 0\" : 0, position: \"relative\" }}>\n          {children}\n        </div>\n        {footer && <div style={{ flex: \"none\", padding: \"12px 24px 26px\" }}>{footer}</div>}\n      </div>\n    </div>\n  );\n}\n\n// ---- Screens ---------------------------------------------------------------\n\nfunction HomeScreen() {\n  return (\n    <Phone title=\"Home · SOS\">\n      <div style={{ display: \"flex\", flexDirection: \"column\", height: \"100%\" }}>\n        <div style={{ paddingTop: 12 }}>\n          <div style={{ fontFamily: \"var(--font-ui)\", fontSize: 12, fontWeight: 700, letterSpacing: \"0.08em\", textTransform: \"uppercase\", color: \"var(--text-accent)\" }}>Wednesday evening</div>\n          <div style={{ fontFamily: \"var(--font-display)\", fontSize: 30, lineHeight: \"37px\", fontWeight: 560, color: \"var(--text-body)\", marginTop: 6 }}>You're not failing. This is a hard age.</div>\n        </div>\n        <div style={{ flex: 1, display: \"flex\", alignItems: \"center\", justifyContent: \"center\" }}>\n          <SOSButton />\n        </div>\n        <Card tone=\"well\" elevated={false} padding={16} style={{ display: \"flex\", alignItems: \"center\", gap: 12, marginBottom: 8 }}>\n          <Icon name=\"life-buoy\" size={20} color=\"var(--text-soft)\" />\n          <span style={{ flex: 1, fontFamily: \"var(--font-ui)\", fontSize: 13, color: \"var(--text-soft)\" }}>In crisis? Reach a real person now.</span>\n          <Icon name=\"chevron-right\" size={18} color=\"var(--text-faint)\" />\n        </Card>\n      </div>\n    </Phone>\n  );\n}\n\nfunction BreatherScreen() {\n  return (\n    <Phone title=\"Breather\" theme=\"dark\" pad={false}\n      footer={<Button variant=\"secondary\" style={{ background: \"rgba(255,255,255,0.16)\", color: \"#fff\" }}>Skip to the script</Button>}>\n      <div style={{ position: \"absolute\", inset: 0, background: \"linear-gradient(160deg, #274d42, #2f6f5e 70%, #3d8571)\" }} />\n      <div style={{ position: \"relative\", flex: 1, display: \"flex\", flexDirection: \"column\", alignItems: \"center\", justifyContent: \"center\", gap: 40, padding: 24 }}>\n        <div style={{ textAlign: \"center\" }}>\n          <div style={{ fontFamily: \"var(--font-ui)\", fontSize: 12, fontWeight: 700, letterSpacing: \"0.08em\", textTransform: \"uppercase\", color: \"rgba(255,255,255,0.7)\" }}>60 seconds</div>\n          <div style={{ fontFamily: \"var(--font-display)\", fontSize: 24, color: \"#fff\", marginTop: 6 }}>Let's slow it down together.</div>\n        </div>\n        <BreatherOrb size={230} />\n      </div>\n    </Phone>\n  );\n}\n\nfunction ScriptScreen() {\n  return (\n    <Phone title=\"Script\" footer={<Button>That helped</Button>}>\n      <div style={{ display: \"flex\", alignItems: \"center\", justifyContent: \"space-between\", paddingTop: 8, marginBottom: 16 }}>\n        <IconButton icon=\"chevron-left\" label=\"Back\" size={44} />\n        <span style={{ fontFamily: \"var(--font-ui)\", fontSize: 15, fontWeight: 600, color: \"var(--text-body)\" }}>Right now</span>\n        <IconButton icon=\"x\" label=\"Close\" size={44} />\n      </div>\n      <ScriptCard\n        situation=\"When they hit or throw\"\n        say={[\"Get low. Say less.\", \"“I'm right here. I won't let you hit.”\"]}\n        doLine=\"Block the hit with a calm hand and name it once.\"\n        dontLine=\"Don't explain the rule mid-storm — save teaching for later.\"\n        free\n      />\n      <div style={{ marginTop: 16, display: \"flex\", gap: 8, flexWrap: \"wrap\" }}>\n        <Chip selected>Hitting</Chip>\n        <Chip>Bedtime</Chip>\n        <Chip>Mealtime</Chip>\n        <Chip>Leaving</Chip>\n      </div>\n    </Phone>\n  );\n}\n\nfunction CheckInScreen() {\n  const [feeling, setFeeling] = React.useState(\"Steadier\");\n  return (\n    <Phone title=\"Check-in\" footer={<div style={{ display: \"flex\", flexDirection: \"column\", gap: 10 }}><Button variant=\"repair\">Read: after you yell</Button><Button variant=\"ghost\" fullWidth>Not now</Button></div>}>\n      <div style={{ display: \"flex\", flexDirection: \"column\", height: \"100%\", paddingTop: 12 }}>\n        <div style={{ fontFamily: \"var(--font-display)\", fontSize: 26, lineHeight: \"33px\", fontWeight: 540, color: \"var(--text-body)\" }}>That counts.</div>\n        <div style={{ fontFamily: \"var(--font-ui)\", fontSize: 17, lineHeight: \"26px\", color: \"var(--text-soft)\", marginTop: 8 }}>You showed up for the hard 90 seconds. That's the whole thing.</div>\n        <div style={{ flex: 1 }} />\n        <Card tone=\"surface\" style={{ marginBottom: 8 }}>\n          <CheckInRow value={feeling} onSelect={setFeeling} />\n        </Card>\n      </div>\n    </Phone>\n  );\n}\n\nfunction ProgressScreen() {\n  const days = [\"quiet\",\"used\",\"hard\",\"used\",\"used\",\"quiet\",\"hard\",\"used\",\"quiet\",\"used\",\"used\",\"hard\",\"quiet\",\"used\",\"used\",\"quiet\",\"used\",\"hard\",\"used\",\"used\",\"quiet\",\"used\",\"used\",\"quiet\",\"hard\",\"used\",\"used\",\"quiet\"];\n  return (\n    <Phone title=\"This month\">\n      <div style={{ paddingTop: 12, display: \"flex\", flexDirection: \"column\", gap: 16, overflowY: \"auto\" }}>\n        <div style={{ fontFamily: \"var(--font-display)\", fontSize: 26, lineHeight: \"33px\", fontWeight: 540, color: \"var(--text-body)\" }}>You've been steadier than it feels.</div>\n        <Card tone=\"surface\">\n          <MomentDots days={days} caption=\"14 hard moments this month; you used a breather in 9. That counts.\" />\n        </Card>\n        <Card tone=\"accent\" elevated={false}>\n          <div style={{ display: \"flex\", gap: 12, alignItems: \"flex-start\" }}>\n            <Icon name=\"wind\" size={22} color=\"var(--accent-strong)\" />\n            <div>\n              <div style={{ fontFamily: \"var(--font-ui)\", fontSize: 15, fontWeight: 600, color: \"var(--text-body)\" }}>Your breather is working</div>\n              <div style={{ fontFamily: \"var(--font-ui)\", fontSize: 14, lineHeight: \"21px\", color: \"var(--text-soft)\", marginTop: 2 }}>On breather days, you logged fewer rough ones. No pressure — just here when you need it.</div>\n            </div>\n          </div>\n        </Card>\n        <div style={{ display: \"flex\", gap: 8, alignItems: \"center\" }}>\n          <Badge tone=\"free\">Repair scripts always free</Badge>\n        </div>\n      </div>\n    </Phone>\n  );\n}\n\nfunction OnboardingScreen() {\n  return (\n    <Phone title=\"Welcome\" footer={<div style={{ display: \"flex\", flexDirection: \"column\", gap: 10 }}><Button>Start with a breather</Button><Button variant=\"ghost\" fullWidth>Not now — stay anonymous</Button></div>}>\n      <div style={{ display: \"flex\", flexDirection: \"column\", height: \"100%\", paddingTop: 16 }}>\n        <div style={{ fontFamily: \"var(--font-display)\", fontSize: 34, lineHeight: \"42px\", fontWeight: 560, color: \"var(--text-body)\" }}>Steady</div>\n        <div style={{ fontFamily: \"var(--font-display)\", fontSize: 22, lineHeight: \"32px\", color: \"var(--text-soft)\", marginTop: 10 }}>For the moment you're about to lose it.</div>\n        <div style={{ flex: 1 }} />\n        <Card tone=\"well\" elevated={false} padding={16} style={{ display: \"flex\", gap: 12, alignItems: \"flex-start\", marginBottom: 8 }}>\n          <Icon name=\"shield\" size={20} color=\"var(--text-accent)\" />\n          <span style={{ fontFamily: \"var(--font-ui)\", fontSize: 14, lineHeight: \"21px\", color: \"var(--text-soft)\" }}>We never collect anything about your child. Your moments are yours.</span>\n        </Card>\n      </div>\n    </Phone>\n  );\n}\n\nfunction SettingsScreen() {\n  const [dark, setDark] = React.useState(false);\n  const [haptics, setHaptics] = React.useState(true);\n  const [anon, setAnon] = React.useState(true);\n  return (\n    <Phone title=\"Settings\">\n      <div style={{ paddingTop: 12, display: \"flex\", flexDirection: \"column\", gap: 16 }}>\n        <div style={{ fontFamily: \"var(--font-display)\", fontSize: 26, fontWeight: 540, color: \"var(--text-body)\" }}>Settings</div>\n        <Card tone=\"surface\" style={{ display: \"flex\", flexDirection: \"column\", gap: 18 }}>\n          <Switch label=\"Bedtime theme\" description=\"Dim, warm colors after dark\" checked={dark} onChange={setDark} />\n          <div style={{ height: 1, background: \"var(--border-hairline)\" }} />\n          <Switch label=\"Haptic breather\" description=\"Gentle buzz to pace your breath\" checked={haptics} onChange={setHaptics} />\n          <div style={{ height: 1, background: \"var(--border-hairline)\" }} />\n          <Switch label=\"Stay anonymous\" description=\"No account, nothing shared\" checked={anon} onChange={setAnon} />\n        </Card>\n        <Card tone=\"surface\" style={{ display: \"flex\", flexDirection: \"column\", gap: 12 }}>\n          <Input label=\"Email (optional)\" type=\"email\" placeholder=\"you@example.com\" helper=\"Only to save progress across devices.\" />\n        </Card>\n      </div>\n    </Phone>\n  );\n}\n\nfunction UIKit() {\n  return (\n    <div style={{ display: \"flex\", flexWrap: \"wrap\", gap: 48, padding: 48, justifyContent: \"center\", alignItems: \"flex-start\", background: \"var(--paper)\", minHeight: \"100vh\" }}>\n      <OnboardingScreen />\n      <HomeScreen />\n      <BreatherScreen />\n      <ScriptScreen />\n      <CheckInScreen />\n      <ProgressScreen />\n      <SettingsScreen />\n    </div>\n  );\n}\n\n\nReactDOM.createRoot(document.getElementById(\"root\")).render(React.createElement(UIKit));\n"</script>
